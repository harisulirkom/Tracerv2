server {
    listen 80;
    server_name tracer.cdc.example.com;

    root /var/www/cdc/frontend/dist;
    index index.html;

    access_log /var/log/nginx/tracerv2-access.log;
    error_log /var/log/nginx/tracerv2-error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
