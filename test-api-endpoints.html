<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracerv2 API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .auth-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .auth-form {
            display: flex;
            gap: 15px;
            align-items: end;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-authenticated {
            background: #d4edda;
            color: #155724;
        }

        .status-guest {
            background: #f8d7da;
            color: #721c24;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 600px;
        }

        .sidebar {
            background: #f8f9fa;
            border-right: 2px solid #e9ecef;
            padding: 20px;
            overflow-y: auto;
            max-height: 80vh;
        }

        .endpoint-category {
            margin-bottom: 25px;
        }

        .category-title {
            font-weight: 700;
            color: #495057;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .endpoint-item {
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .endpoint-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .endpoint-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .method-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
        }

        .method-get {
            background: #17a2b8;
            color: white;
        }

        .method-post {
            background: #28a745;
            color: white;
        }

        .method-put {
            background: #ffc107;
            color: #000;
        }

        .method-delete {
            background: #dc3545;
            color: white;
        }

        .test-panel {
            padding: 30px;
            overflow-y: auto;
            max-height: 80vh;
        }

        .test-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }

        .test-header h2 {
            color: #212529;
            margin-bottom: 10px;
        }

        .test-header .endpoint-url {
            font-family: 'Courier New', monospace;
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
            color: #495057;
            font-size: 14px;
        }

        .test-controls {
            margin-bottom: 30px;
        }

        .test-controls textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }

        .test-controls textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .test-results {
            margin-top: 30px;
        }

        .result-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .result-box h3 {
            margin-bottom: 15px;
            color: #495057;
            font-size: 16px;
        }

        .result-box pre {
            background: #212529;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.5;
        }

        .result-success {
            border-left: 4px solid #28a745;
        }

        .result-error {
            border-left: 4px solid #dc3545;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-card .number {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-card .label {
            font-size: 12px;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Tracerv2 API Tester</h1>
            <p>Comprehensive API Endpoint Testing Tool</p>
        </div>

        <div class="auth-section">
            <div class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" value="admin@tracer.local" placeholder="admin@tracer.local">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" value="admin123" placeholder="Password">
                </div>
                <button class="btn btn-primary" onclick="login()">Login</button>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
                <button class="btn btn-success" onclick="runAllTests()">Run All Tests</button>
            </div>
            <div style="margin-top: 15px;">
                <strong>Status:</strong>
                <span id="auth-status" class="status-badge status-guest">Guest</span>
                <span id="user-info" style="margin-left: 15px; color: #495057;"></span>
            </div>
            <div class="stats" id="stats" style="margin-top: 20px; display: none;">
                <div class="stat-card">
                    <div class="number" id="stat-total">0</div>
                    <div class="label">Total Tests</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="stat-passed" style="color: #28a745;">0</div>
                    <div class="label">Passed</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="stat-failed" style="color: #dc3545;">0</div>
                    <div class="label">Failed</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar" id="sidebar"></div>
            <div class="test-panel" id="test-panel">
                <div style="text-align: center; padding: 60px 20px; color: #6c757d;">
                    <h2>Select an endpoint to test</h2>
                    <p style="margin-top: 10px;">Choose from the sidebar or click "Run All Tests"</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        let authToken = null;
        let testResults = [];

        const endpoints = {
            'Authentication': [
                { method: 'POST', path: '/login', name: 'Login', body: { email: 'admin@tracer.local', password: 'admin123' } },
                { method: 'GET', path: '/me', name: 'Get Current User', auth: true },
                { method: 'GET', path: '/user', name: 'Get User Profile', auth: true },
                { method: 'POST', path: '/logout', name: 'Logout', auth: true }
            ],
            'Alumni': [
                { method: 'GET', path: '/alumni', name: 'List Alumni' },
                { method: 'GET', path: '/alumni/search', name: 'Search Alumni', query: { q: 'test' } },
                { method: 'GET', path: '/alumni/lookup/123456', name: 'Lookup by NIM' }
            ],
            'Questionnaires': [
                { method: 'GET', path: '/questionnaires', name: 'List Questionnaires' },
                { method: 'GET', path: '/questionnaires/active', name: 'Get Active Questionnaire' },
                { method: 'GET', path: '/questionnaires/1', name: 'Get Questionnaire Detail' },
                { method: 'GET', path: '/questionnaires/1/questions', name: 'Get Questions' },
                { method: 'GET', path: '/questionnaires/1/responses', name: 'Get Responses' }
            ],
            'Responses': [
                { method: 'GET', path: '/responses/1', name: 'Get Alumni Attempts' },
                { method: 'GET', path: '/responses/attempt/1', name: 'Get Attempt Detail' }
            ],
            'Dashboard': [
                { method: 'GET', path: '/dashboard', name: 'Sample Dashboard' },
                { method: 'GET', path: '/dashboard/summary', name: 'Admin Summary' },
                { method: 'GET', path: '/dashboard/tracer', name: 'Tracer Summary Query' },
                { method: 'GET', path: '/dashboard/tracer/insights', name: 'Tracer Insights' }
            ],
            'Jobs': [
                { method: 'GET', path: '/jobs', name: 'List Jobs' },
                { method: 'GET', path: '/jobs/1', name: 'Get Job Detail' }
            ],
            'News': [
                { method: 'GET', path: '/news', name: 'List News' },
                { method: 'GET', path: '/news/1', name: 'Get News Detail' }
            ],
            'CTA & Homepage': [
                { method: 'GET', path: '/cta', name: 'Get CTA' },
                { method: 'GET', path: '/homepage', name: 'Get Homepage' }
            ],
            'Question Bank': [
                { method: 'GET', path: '/question-bank', name: 'List Question Bank' }
            ],
            'Admin Users': [
                { method: 'GET', path: '/admin/users', name: 'List Admin Users', auth: true }
            ],
            'Wilayah': [
                { method: 'GET', path: '/wilayah/provinces', name: 'Get Provinces' },
                { method: 'GET', path: '/wilayah/regencies/11', name: 'Get Regencies' }
            ]
        };

        function initSidebar() {
            const sidebar = document.getElementById('sidebar');
            let html = '';

            Object.keys(endpoints).forEach(category => {
                html += `<div class="endpoint-category">`;
                html += `<div class="category-title">${category}</div>`;

                endpoints[category].forEach((endpoint, idx) => {
                    const id = `${category}-${idx}`;
                    html += `
                        <div class="endpoint-item" onclick="selectEndpoint('${category}', ${idx})">
                            <span class="method-badge method-${endpoint.method.toLowerCase()}">${endpoint.method}</span>
                            <span>${endpoint.name}</span>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            sidebar.innerHTML = html;
        }

        function selectEndpoint(category, idx) {
            const endpoint = endpoints[category][idx];

            document.querySelectorAll('.endpoint-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.endpoint-item').classList.add('active');

            const panel = document.getElementById('test-panel');
            let bodyHtml = '';

            if (endpoint.body) {
                bodyHtml = `
                    <div class="test-controls">
                        <label style="display: block; margin-bottom: 10px; font-weight: 600;">Request Body (JSON)</label>
                        <textarea id="request-body">${JSON.stringify(endpoint.body, null, 2)}</textarea>
                    </div>
                `;
            }

            panel.innerHTML = `
                <div class="test-header">
                    <h2>
                        <span class="method-badge method-${endpoint.method.toLowerCase()}">${endpoint.method}</span>
                        ${endpoint.name}
                    </h2>
                    <div class="endpoint-url">${API_BASE}${endpoint.path}</div>
                    ${endpoint.auth ? '<p style="margin-top: 10px; color: #dc3545;">⚠️ Requires Authentication</p>' : ''}
                </div>
                
                ${bodyHtml}
                
                <button class="btn btn-primary" onclick="testEndpoint('${category}', ${idx})">
                    🧪 Test This Endpoint
                </button>
                
                <div class="test-results" id="results"></div>
            `;
        }

        async function testEndpoint(category, idx) {
            const endpoint = endpoints[category][idx];
            const resultsDiv = document.getElementById('results');

            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Testing endpoint...</p></div>';

            try {
                let url = API_BASE + endpoint.path;

                if (endpoint.query) {
                    const params = new URLSearchParams(endpoint.query);
                    url += '?' + params.toString();
                }

                const options = {
                    method: endpoint.method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                };

                if (endpoint.auth && authToken) {
                    options.headers['Authorization'] = `Bearer ${authToken}`;
                }

                if (endpoint.body && endpoint.method !== 'GET') {
                    const bodyTextarea = document.getElementById('request-body');
                    options.body = bodyTextarea ? bodyTextarea.value : JSON.stringify(endpoint.body);
                }

                const startTime = Date.now();
                const response = await fetch(url, options);
                const endTime = Date.now();
                const duration = endTime - startTime;

                const data = await response.json().catch(() => ({}));

                const success = response.ok;

                resultsDiv.innerHTML = `
                    <div class="result-box ${success ? 'result-success' : 'result-error'}">
                        <h3>
                            ${success ? '✅ Success' : '❌ Error'} 
                            - Status: ${response.status} 
                            - Duration: ${duration}ms
                        </h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;

                return { success, status: response.status, data, duration };

            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="result-box result-error">
                        <h3>❌ Network Error</h3>
                        <pre>${error.message}</pre>
                    </div>
                `;

                return { success: false, error: error.message };
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(API_BASE + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    authToken = data.token;
                    localStorage.setItem('api_test_token', authToken);
                    updateAuthStatus(true, data.user);
                    alert('✅ Login successful!');
                } else {
                    alert('❌ Login failed: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                alert('❌ Login error: ' + error.message);
            }
        }

        function logout() {
            authToken = null;
            localStorage.removeItem('api_test_token');
            updateAuthStatus(false);
            alert('✅ Logged out');
        }

        function updateAuthStatus(authenticated, user = null) {
            const statusBadge = document.getElementById('auth-status');
            const userInfo = document.getElementById('user-info');

            if (authenticated) {
                statusBadge.className = 'status-badge status-authenticated';
                statusBadge.textContent = 'Authenticated';
                userInfo.textContent = user ? `${user.name} (${user.email})` : '';
            } else {
                statusBadge.className = 'status-badge status-guest';
                statusBadge.textContent = 'Guest';
                userInfo.textContent = '';
            }
        }

        async function runAllTests() {
            testResults = [];
            let passed = 0;
            let failed = 0;

            document.getElementById('stats').style.display = 'grid';

            const panel = document.getElementById('test-panel');
            panel.innerHTML = '<div class="loading"><div class="spinner"></div><p>Running all tests...</p></div>';

            let resultsHtml = '<h2 style="margin-bottom: 20px;">Test Results</h2>';

            for (const category of Object.keys(endpoints)) {
                for (let idx = 0; idx < endpoints[category].length; idx++) {
                    const endpoint = endpoints[category][idx];

                    // Skip auth-required endpoints if not authenticated
                    if (endpoint.auth && !authToken) {
                        continue;
                    }

                    const result = await testEndpoint(category, idx);
                    testResults.push({ category, endpoint, result });

                    if (result.success) passed++;
                    else failed++;

                    document.getElementById('stat-total').textContent = passed + failed;
                    document.getElementById('stat-passed').textContent = passed;
                    document.getElementById('stat-failed').textContent = failed;

                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            }

            // Display summary
            resultsHtml += `<div class="result-box result-success">`;
            resultsHtml += `<h3>📊 Test Summary</h3>`;
            resultsHtml += `<p>Total: ${passed + failed} | Passed: ${passed} | Failed: ${failed}</p>`;
            resultsHtml += `</div>`;

            testResults.forEach(({ category, endpoint, result }) => {
                resultsHtml += `
                    <div class="result-box ${result.success ? 'result-success' : 'result-error'}">
                        <h3>
                            ${result.success ? '✅' : '❌'} 
                            ${category} - ${endpoint.name}
                            <span class="method-badge method-${endpoint.method.toLowerCase()}">${endpoint.method}</span>
                        </h3>
                        <div class="endpoint-url">${endpoint.path}</div>
                        ${result.status ? `<p>Status: ${result.status} | Duration: ${result.duration}ms</p>` : ''}
                    </div>
                `;
            });

            panel.innerHTML = resultsHtml;
        }

        // Initialize
        window.onload = () => {
            initSidebar();

            // Check for saved token
            const savedToken = localStorage.getItem('api_test_token');
            if (savedToken) {
                authToken = savedToken;
                updateAuthStatus(true);
            }
        };
    </script>
</body>

</html>
